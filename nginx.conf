server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Cache control - sempre revalidar HTML/JS/CSS em dev
    # Em produção, usar hashes nos filenames e cache longo
    location ~* \.(html|js|css)$ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Assets (imagens, áudio, fontes) - cache mais longo
    location ~* \.(mp3|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm editor.html;
        try_files $uri $uri/ =404;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
