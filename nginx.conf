server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # MIME types
    include /etc/nginx/mime.types;

    # Service Worker — SEMPRE fresh (nunca cachear)
    location = /sw.js {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        expires off;
    }

    # Manifest
    location = /manifest.json {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "application/manifest+json" always;
    }

    # PWA icons - cache longo
    location ~* ^/assets/icons/ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Cache control - HTML/JS/CSS em dev (no-cache para desenvolvimento)
    location ~* \.(html|js|css)$ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Assets (imagens, áudio, fontes) - cache mais longo
    location ~* \.(mp3|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|ico)$ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=86400";
    }

    # QR Codes
    location ~* ^/assets/qrcodes/ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm editor.html;
        try_files $uri $uri/ =404;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
